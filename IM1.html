  .fw-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--light); margin-bottom: 0.4rem; }
  .fw-value { font-family: var(--serif); font-size: 1rem; color: var(--navy); line-height: 1.3; }
  .swot { background: var(--cream); padding: 6rem 3rem; }
  .swot-inner { max-width: 1100px; margin: 0 auto; }
  .swot h2 { font-family: var(--serif); font-size: clamp(2.2rem, 3.5vw, 3rem); color: var(--navy); letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  .swot-sub { color: var(--mid); font-size: 1rem; margin-bottom: 3.5rem; max-width: 540px; }

  .contact-item { font-size: 0.88rem; color: rgba(255,255,255,0.5); }

    .hero-inner, .about-grid, .personality-grid, .skills-grid, .fit-grid, .swot-grid, .vision-block { grid-template-columns: 1fr; }
    .framework-grid { grid-template-columns: 1fr 1fr; }
    section, .hero { padding: 5rem 1.5rem 3rem; } .hero { padding-top: 7rem; }

</head>
<body>
<div id="app"></div>
<script>
const ICONS = {
  layers: `<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
  users:  `<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  video:  `<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
  chart:  `<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
  mail:   `<svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
  people: `<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/><line x1="20" y1="8" x2="20" y2="14"/></svg>`,
};
const SC = { S:'s', W:'w', O:'o', T:'t' };
function gld(text, word) { return (!word||!text.includes(word)) ? text : text.replace(word,`<em>${word}</em>`); }
function render() {
  const C = CONTENT;
  document.title = `${C.nav.name} — ${C.hero.eyebrow}`;
  const hl = C.hero.headline.map(l => l===C.hero.headlineGold?`<em>${l}</em>`:l).join('<br>');
  document.getElementById('app').innerHTML = `
    <nav><div class="nav-logo">${C.nav.name}</div><div class="nav-links">${C.nav.links.map(l=>`<a href="${l.href}">${l.label}</a>`).join('')}</div></nav>
    <section class="hero" id="hero"><div class="hero-inner"><div>
      <div class="hero-eyebrow">${C.hero.eyebrow}</div>
      <h1>${hl}</h1>
      <p class="hero-sub">${C.hero.sub}</p>
      <div class="hero-cta-row"><a href="${C.hero.cta1Href}" class="btn btn-gold">${C.hero.cta1Label}</a><a href="${C.hero.cta2Href}" class="btn btn-outline">${C.hero.cta2Label}</a></div>
    </div><div class="hero-right">${C.hero.stats.map(s=>`<div class="stat-card"><div class="stat-num">${s.num}</div><div class="stat-label"><strong>${s.title}</strong>${s.sub}</div></div>`).join('')}</div></div></section>
    <section class="about" id="about"><div class="about-inner">
      <div class="section-tag">${C.about.sectionTag}</div>
      <div class="about-grid"><div>
        <h2>${C.about.headline}</h2>
        ${C.about.body.map(p=>`<p>${p}</p>`).join('')}
        <div class="pull-quote"><p>${C.about.pullQuote}</p></div>
      </div><div class="value-grid">${C.about.values.map(v=>`<div class="value-item"><div class="value-num">${v.num}</div><div class="value-title">${v.title}</div><div class="value-desc">${v.desc}</div></div>`).join('')}</div></div>
    </div></section>
    <section class="journey" id="journey"><div class="journey-inner">
      <div class="section-tag">${C.journey.sectionTag}</div>
      <h2>${C.journey.headline}</h2><p class="journey-sub">${C.journey.sub}</p>
      <div class="timeline">${C.journey.stops.map(s=>`<div class="tl-item"><div class="tl-dot"></div><div class="tl-year">${s.year}</div><div class="tl-role">${s.role}</div><div class="tl-org">${s.org}</div><div class="tl-desc">${s.desc}</div><span class="tl-badge">${s.badge}</span></div>`).join('')}</div>
    </div></section>
    <section class="skills" id="skills"><div class="skills-inner">
      <div class="section-tag">${C.skills.sectionTag}</div>
      <h2>${C.skills.headline}</h2><p class="skills-sub">${C.skills.sub}</p>
      <div class="skills-grid">${C.skills.cards.map(c=>`<div class="skill-card"><div class="skill-icon">${ICONS[c.icon]||ICONS.layers}</div><h3>${c.title}</h3><p>${c.body}</p><div class="skill-tags">${c.tags.map(t=>`<span class="skill-tag">${t}</span>`).join('')}</div></div>`).join('')}</div>
    </div></section>
    <section class="fit" id="fit"><div class="fit-inner">
      <div class="section-tag">${C.fit.sectionTag}</div>
      <h2>${C.fit.headline}</h2><p class="fit-sub">${C.fit.sub}</p>
      <div class="fit-grid">${C.fit.cards.map(c=>`<div class="fit-card"><h3>${c.title}</h3><p>${c.body}</p></div>`).join('')}</div>
      <div class="vision-block"><div><h3>${C.fit.vision.headline}</h3><p>${C.fit.vision.body}</p></div>
      <div class="vision-points">${C.fit.vision.points.map(p=>`<div class="vision-point"><div class="vp-bullet"><span>${p.num}</span></div><p><strong>${p.title}</strong>${p.body}</p></div>`).join('')}</div></div>
    </div></section>
    <section class="personality" id="personality"><div class="personality-inner">
      <div class="section-tag">${C.personality.sectionTag}</div>
      <h2>${C.personality.headline}</h2><p class="personality-sub">${C.personality.sub}</p>
      <div class="personality-grid">
        <div class="trait-block">${C.personality.traits.map(t=>`<div class="trait-item"><div class="trait-pill">${t.label}</div><div class="trait-desc">${t.desc}</div></div>`).join('')}</div>
        <div><div class="framework-grid">${C.personality.frameworks.map(f=>`<div class="framework-card"><div class="fw-label">${f.label}</div><div class="fw-value">${f.value}</div></div>`).join('')}</div>
        <div style="margin-top:1.5rem;padding:1.5rem;background:var(--cream);border-radius:6px;"><div style="font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--light);margin-bottom:0.75rem;">Beyond the work</div><p style="font-size:0.88rem;color:var(--mid);line-height:1.7;">${C.personality.beyondWork}</p></div></div>
      </div>
    </div></section>
    <section class="swot" id="swot"><div class="swot-inner">
      <div class="section-tag">${C.swot.sectionTag}</div>
      <h2>${C.swot.headline}</h2><p class="swot-sub">${C.swot.sub}</p>
      <div class="swot-grid">${C.swot.quadrants.map(q=>`<div class="swot-card ${SC[q.letter]}"><div class="swot-letter">${q.letter}</div><div class="swot-title">${q.title}</div><ul class="swot-list">${q.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('')}</div>
    </div></section>
    <section class="closing" id="contact"><div class="closing-inner">
      <div class="section-tag">${C.closing.sectionTag}</div>
      <h2>${gld(C.closing.headline,C.closing.headlineGold)}</h2>
      <p>${C.closing.body}</p>
      <a href="mailto:${C.closing.email}" class="btn btn-gold" style="margin:0 auto 2.5rem;display:inline-flex;">${C.closing.ctaLabel}</a>
      <div class="contact-row">
        <div class="contact-item"><a href="mailto:${C.closing.email}">${C.closing.email}</a></div>
        <div class="contact-item" style="color:rgba(255,255,255,0.2);">·</div>
        <div class="contact-item">${C.closing.phone}</div>
        <div class="contact-item" style="color:rgba(255,255,255,0.2);">·</div>
        <div class="contact-item">${C.closing.location}</div>
        <div class="contact-item" style="color:rgba(255,255,255,0.2);">·</div>
        <div class="contact-item"><a href="https://${C.closing.linkedin}">${C.closing.linkedin}</a></div>
      </div>
      <div class="closing-quote">${C.closing.quote}</div>
    </div></section>`;
}
render();
</script>
</body>
</html>
